name: E2E SynthMRSI-Project

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # weekly, Mondays 06:00 UTC

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      MRSIPREP_E2E_DATA_DIR: ${{ github.workspace }}/SynthMRSI-Project
      SYNTHMRSI_PROJECT_URL: https://zenodo.org/records/21477048/files/SynthMRSI-Project.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,test-e2e]"

      - name: Pull MRSIPrep image
        run: docker pull mrsiup/mrsiprep:cpu

      - name: Download SynthMRSI-Project dataset
        run: |
          curl -fL -o SynthMRSI-Project.zip "${SYNTHMRSI_PROJECT_URL}"
          unzip -q SynthMRSI-Project.zip -d "${MRSIPREP_E2E_DATA_DIR}"

      - name: Decode FreeSurfer license
        env:
          FREESURFER_LICENSE_B64: ${{ secrets.FREESURFER_LICENSE }}
        run: |
          echo "${FREESURFER_LICENSE_B64}" | base64 -d > "${{ github.workspace }}/freesurfer_license.txt"
          echo "FS_LICENSE=${{ github.workspace }}/freesurfer_license.txt" >> "${GITHUB_ENV}"

      - name: Run end-to-end test
        run: pytest -m e2e_synthmrsi_project --no-cov tests/test_synthmrsi_project_e2e.py
